name: Deploy to Cloudflare Pages

# Auto-deploy the public/ folder to the existing Cloudflare Pages project on every
# push to main. Keeps the Direct-Upload project + custom domains intact (no native
# git-connect needed). Requires two repo secrets:
#   CLOUDFLARE_API_TOKEN  - a token with Pages:Edit (create at dash.cloudflare.com -> My Profile -> API Tokens)
#   CLOUDFLARE_ACCOUNT_ID - 952e883090709e56962f92fc5fdf40f0 (not secret; set for convenience)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy public/ to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy public --project-name=diskdetox --branch=main
